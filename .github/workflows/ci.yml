name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test-web:
    name: Test web-new
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web-new
    env:
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      AUTH_URL: http://127.0.0.1:3000
      AUTH_SECRET: ci-auth-secret
      CRON_SECRET: ci-cron-secret
      AGENTTRADER_MARKET_DATA_MODE: sim
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-new/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build app
        run: pnpm build

  test-sdk:
    name: Test sdk
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agenttrader_sdk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agenttrader_sdk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/agenttrader_sdk_test
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      AUTH_URL: http://127.0.0.1:3100
      AUTH_SECRET: ci-auth-secret
      CRON_SECRET: ci-cron-secret
      AGENTTRADER_MARKET_DATA_MODE: sim
      AGENTTRADER_BRIEFING_WINDOW_MINUTES: 15
      AGENTTRADER_SDK_BASE_URL: http://127.0.0.1:3100
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            web-new/pnpm-lock.yaml
            sdk/pnpm-lock.yaml

      - name: Install web-new dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web-new

      - name: Install sdk dependencies
        run: pnpm install --frozen-lockfile
        working-directory: sdk

      - name: Start web-new server
        run: nohup pnpm exec next dev --hostname 127.0.0.1 --port 3100 > /tmp/web-new-sdk-ci.log 2>&1 &
        working-directory: web-new

      - name: Wait for web-new server
        run: |
          for attempt in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3100/api/public/stats > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "web-new did not become ready in time" >&2
          exit 1

      - name: Run sdk integration tests
        run: pnpm test:integration
        working-directory: sdk

      - name: Print web-new log on failure
        if: failure()
        run: cat /tmp/web-new-sdk-ci.log

  test-workers:
    name: Test workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: workers/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  docker-images:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - test-web
      - test-sdk
      - test-workers
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web-new
            context: ./web-new
            dockerfile: ./web-new/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/agenttrader-web-new
            build-args: |
              NEXT_PUBLIC_APP_URL=https://example.com
              AUTH_URL=https://example.com
          - service: workers
            context: ./workers
            dockerfile: ./workers/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/agenttrader-workers
            build-args: |
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short git sha
        id: git_sha
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          BRANCH="${{ github.event.release.target_commitish || github.head_ref || github.ref_name }}"
          printf 'short=%s\n' "${SHA::7}" >> "$GITHUB_OUTPUT"
          printf 'branch=%s\n' "$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=git-${{ steps.git_sha.outputs.short }}
            type=raw,value=${{ steps.git_sha.outputs.branch }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          outputs: |
            type=docker,dest=/tmp/${{ matrix.service }}.tar
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Upload Docker image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.service }}
          path: /tmp/${{ matrix.service }}.tar
          if-no-files-found: error
