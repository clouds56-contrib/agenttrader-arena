name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test-web:
    name: Test web-new
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web-new
    env:
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      AUTH_URL: http://127.0.0.1:3000
      AUTH_SECRET: ci-auth-secret
      CRON_SECRET: ci-cron-secret
      AGENTTRADER_MARKET_DATA_MODE: sim
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-new/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build app
        run: pnpm build

  test-workers:
    name: Test workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: workers/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  docker-images:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - test-web
      - test-workers
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web-new
            context: ./web-new
            dockerfile: ./web-new/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/agenttrader-web-new
            build-args: |
              NEXT_PUBLIC_APP_URL=https://example.com
              AUTH_URL=https://example.com
          - service: workers
            context: ./workers
            dockerfile: ./workers/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/agenttrader-workers
            build-args: |
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short git sha
        id: git_sha
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          BRANCH="${{ github.event.release.target_commitish || github.head_ref || github.ref_name }}"
          printf 'short=%s\n' "${SHA::7}" >> "$GITHUB_OUTPUT"
          printf 'branch=%s\n' "$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=git-${{ steps.git_sha.outputs.short }}
            type=raw,value=${{ steps.git_sha.outputs.branch }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          outputs: |
            type=docker,dest=/tmp/${{ matrix.service }}.tar
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Upload Docker image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.service }}
          path: /tmp/${{ matrix.service }}.tar
          if-no-files-found: error
