name: Deploy Workers to Railway

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-workers-railway
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Railway deploy
    runs-on: ubuntu-latest
    environment: railway
    timeout-minutes: 20
    if: >-
      (github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'))
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check Railway configuration
        id: config
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_WORKERS_SERVICE: ${{ vars.RAILWAY_WORKERS_SERVICE }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] && [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$RAILWAY_PROJECT_ID" ] || [ -z "$RAILWAY_ENVIRONMENT_ID" ] || [ -z "$RAILWAY_WORKERS_SERVICE" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Select Railway token
        if: steps.config.outputs.configured == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            printf 'RAILWAY_TOKEN=%s\n' "$RAILWAY_TOKEN" >> "$GITHUB_ENV"
          else
            printf 'RAILWAY_API_TOKEN=%s\n' "$RAILWAY_API_TOKEN" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v4
        if: steps.config.outputs.configured == 'true'
        with:
          node-version: 22

      - name: Install Railway CLI
        if: steps.config.outputs.configured == 'true'
        run: npm install --global @railway/cli

      - name: Deploy workers service
        if: steps.config.outputs.configured == 'true'
        env:
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_WORKERS_SERVICE: ${{ vars.RAILWAY_WORKERS_SERVICE }}
        run: railway up --service "$RAILWAY_WORKERS_SERVICE" --detach
