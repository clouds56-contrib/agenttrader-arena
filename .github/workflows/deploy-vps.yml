name: Deploy Full Stack to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: main

concurrency:
  group: deploy-vps
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: VPS deploy
    runs-on: ubuntu-latest
    environment: vps
    timeout-minutes: 30
    if: vars.ENABLE_VPS_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Upload VPS compose bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy/vps/*
          target: ${{ vars.VPS_APP_DIR || '/opt/agenttrader-arena' }}
          strip_components: 2

      - name: Deploy stack on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/agenttrader-arena' }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.repository_owner }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          WEB_IMAGE: ${{ vars.VPS_WEB_IMAGE || format('ghcr.io/{0}/agenttrader-web-new', github.repository_owner) }}
          WORKERS_IMAGE: ${{ vars.VPS_WORKERS_IMAGE || format('ghcr.io/{0}/agenttrader-workers', github.repository_owner) }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'main' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          AUTH_URL: ${{ vars.AUTH_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: ${{ vars.DATABASE_SSL || 'false' }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ vars.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          AGENTTRADER_MARKET_DATA_MODE: ${{ vars.AGENTTRADER_MARKET_DATA_MODE || 'auto' }}
          AGENTTRADER_COMPETITION_PHASE: ${{ vars.AGENTTRADER_COMPETITION_PHASE || 'official' }}
          AGENTTRADER_BRIEFING_WINDOW_MINUTES: ${{ vars.AGENTTRADER_BRIEFING_WINDOW_MINUTES || '15' }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          MASSIVE_WS_URL: ${{ vars.MASSIVE_WS_URL }}
          MASSIVE_BASE_URL: ${{ vars.MASSIVE_BASE_URL || 'https://api.massive.com' }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_WS_URL: ${{ vars.BINANCE_WS_URL }}
          BINANCE_BASE_URL: ${{ vars.BINANCE_BASE_URL || 'https://api.binance.us' }}
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          HTTP_PROXY: ${{ vars.HTTP_PROXY }}
          HTTPS_PROXY: ${{ vars.HTTPS_PROXY }}
          ALL_PROXY: ${{ vars.ALL_PROXY }}
          NO_PROXY: ${{ vars.NO_PROXY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'agentrader' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'agentrader' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          WORKER_ENABLE_SCHEDULER: ${{ vars.WORKER_ENABLE_SCHEDULER || 'true' }}
          WORKER_APP_URL: ${{ vars.WORKER_APP_URL || 'http://web:8080' }}
          BINANCE_ENABLED: ${{ vars.BINANCE_ENABLED || 'true' }}
          MASSIVE_ENABLED: ${{ vars.MASSIVE_ENABLED || 'true' }}
          MASSIVE_SYMBOLS: ${{ vars.MASSIVE_SYMBOLS || 'AAPL,MSFT,NVDA,TSLA,AMZN' }}
          MASSIVE_RECENT_SYMBOL_LIMIT: ${{ vars.MASSIVE_RECENT_SYMBOL_LIMIT || '8' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_DIR,GHCR_USERNAME,GHCR_READ_TOKEN,WEB_IMAGE,WORKERS_IMAGE,IMAGE_TAG,NEXT_PUBLIC_APP_URL,AUTH_URL,AUTH_SECRET,CRON_SECRET,DATABASE_URL,DATABASE_SSL,REDIS_URL,UPSTASH_REDIS_REST_URL,UPSTASH_REDIS_REST_TOKEN,AGENTTRADER_MARKET_DATA_MODE,AGENTTRADER_COMPETITION_PHASE,AGENTTRADER_BRIEFING_WINDOW_MINUTES,MASSIVE_API_KEY,MASSIVE_WS_URL,MASSIVE_BASE_URL,BINANCE_API_KEY,BINANCE_WS_URL,BINANCE_BASE_URL,POLYMARKET_API_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GITHUB_CLIENT_ID,GITHUB_CLIENT_SECRET,HTTP_PROXY,HTTPS_PROXY,ALL_PROXY,NO_PROXY,REDIS_PASSWORD,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,WORKER_ENABLE_SCHEDULER,WORKER_APP_URL,BINANCE_ENABLED,MASSIVE_ENABLED,MASSIVE_SYMBOLS,MASSIVE_RECENT_SYMBOL_LIMIT
          script: |
            set -eu
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            if [ -z "$DATABASE_URL" ]; then
              DATABASE_URL="postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB"
            fi
            if [ -z "$REDIS_URL" ]; then
              REDIS_URL="redis://:$REDIS_PASSWORD@redis:6379"
            fi
            cat > .env <<EOF
            WEB_IMAGE=$WEB_IMAGE
            WORKERS_IMAGE=$WORKERS_IMAGE
            IMAGE_TAG=$IMAGE_TAG
            NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL
            AUTH_URL=$AUTH_URL
            AUTH_SECRET=$AUTH_SECRET
            CRON_SECRET=$CRON_SECRET
            DATABASE_URL=$DATABASE_URL
            DATABASE_SSL=$DATABASE_SSL
            REDIS_URL=$REDIS_URL
            UPSTASH_REDIS_REST_URL=$UPSTASH_REDIS_REST_URL
            UPSTASH_REDIS_REST_TOKEN=$UPSTASH_REDIS_REST_TOKEN
            AGENTTRADER_MARKET_DATA_MODE=$AGENTTRADER_MARKET_DATA_MODE
            AGENTTRADER_COMPETITION_PHASE=$AGENTTRADER_COMPETITION_PHASE
            AGENTTRADER_BRIEFING_WINDOW_MINUTES=$AGENTTRADER_BRIEFING_WINDOW_MINUTES
            MASSIVE_API_KEY=$MASSIVE_API_KEY
            MASSIVE_WS_URL=$MASSIVE_WS_URL
            MASSIVE_BASE_URL=$MASSIVE_BASE_URL
            BINANCE_API_KEY=$BINANCE_API_KEY
            BINANCE_WS_URL=$BINANCE_WS_URL
            BINANCE_BASE_URL=$BINANCE_BASE_URL
            POLYMARKET_API_KEY=$POLYMARKET_API_KEY
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET
            HTTP_PROXY=$HTTP_PROXY
            HTTPS_PROXY=$HTTPS_PROXY
            ALL_PROXY=$ALL_PROXY
            NO_PROXY=$NO_PROXY
            REDIS_PASSWORD=$REDIS_PASSWORD
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            WORKER_ENABLE_SCHEDULER=$WORKER_ENABLE_SCHEDULER
            WORKER_APP_URL=$WORKER_APP_URL
            BINANCE_ENABLED=$BINANCE_ENABLED
            MASSIVE_ENABLED=$MASSIVE_ENABLED
            MASSIVE_SYMBOLS=$MASSIVE_SYMBOLS
            MASSIVE_RECENT_SYMBOL_LIMIT=$MASSIVE_RECENT_SYMBOL_LIMIT
            EOF
            if [ -n "$GHCR_READ_TOKEN" ]; then
              echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            docker compose --env-file .env -f docker-compose.yml pull
            docker compose --env-file .env -f docker-compose.yml up -d
